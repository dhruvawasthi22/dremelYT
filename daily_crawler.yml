name: Daily YouTube Metrics Harvester

on:
  schedule:
    # Triggers execution once daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to manually trigger the data update anytime

jobs:
  harvest-and-commit:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository code
      uses: actions/checkout@v3

    - name: Install Python Runtime Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Core Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yake google-api-python-client python-dotenv

    - name: Execute Harvesting Pipeline
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      run: python data_pipeline.py

    - name: Commit and Push Updated Data Back to Repo
      run: |
        git config --global user.name "TrendBot"
        git config --global user.email "actions@github.com"
        git add youtube_power_tool_trends_history.csv youtube_power_tool_videos.csv
        git diff-index --quiet HEAD || git commit -m "Automated Telemetry Update: $(date +'%Y-%m-%d')"
        git push