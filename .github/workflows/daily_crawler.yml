name: Daily YouTube Metrics Harvester

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  harvest-and-commit:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository code
      uses: actions/checkout@v4 # Upgraded to fix deprecation warning

    - name: Install Python Runtime Environment
      uses: actions/setup-python@v5 # Upgraded to fix deprecation warning
      with:
        python-version: '3.10'

    - name: Install Core Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yake google-api-python-client python-dotenv

    - name: List Files (Debugging Step)
      run: ls -la # This prints out your files so you can check for typos in the logs

    - name: Execute Harvesting Pipeline
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      run: python data_pipeline.py
