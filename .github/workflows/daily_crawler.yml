name: Daily YouTube Metrics Harvester

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  harvest-and-commit:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository code
      uses: actions/checkout@v4 # Upgraded to fix deprecation warning

    - name: Install Python Runtime Environment
      uses: actions/setup-python@v5 # Upgraded to fix deprecation warning
      with:
        python-version: '3.10'

    - name: Install Core Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yake google-api-python-client python-dotenv

    - name: List Files (Debugging Step)
      run: ls -la # This prints out your files so you can check for typos in the logs

    - name: Execute Harvesting Pipeline
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      run: python data_pipeline.py

    - name: Commit and Push Updated Data Back to Repo
      run: |
        git config --global user.name "TrendBot"
        git config --global user.email "actions@github.com"
        touch youtube_power_tool_trends_history.csv youtube_power_tool_videos.csv
        git add youtube_power_tool_trends_history.csv youtube_power_tool_videos.csv
        git diff-index --quiet HEAD || git commit -m "Automated Telemetry Update: $(date +'%Y-%m-%d')"
        git push
