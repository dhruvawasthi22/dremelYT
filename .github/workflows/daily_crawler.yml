name: Daily YouTube Metrics Harvester

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  harvest-and-commit:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Install Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Core Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yake google-api-python-client python-dotenv google-auth

    - name: Execute Harvesting Pipeline
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }} # <-- INJECTS YOUR GOOGLE CLOUD CREDENTIALS SECRET
      run: python data_pipeline.py
